# Publishes the built static site to the `gh-pages` branch.
# In repo Settings → Pages, use "Deploy from a branch" → branch `gh-pages`, folder `/ (root)`.
# (Avoids the GitHub "Actions" Pages API that returns 404 until that product path is enabled.)

name: Deploy site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build CSS (Tailwind)
        run: npm run build

      - name: Assemble publish folder
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r categories images js assets _site/
          touch _site/.nojekyll

      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
