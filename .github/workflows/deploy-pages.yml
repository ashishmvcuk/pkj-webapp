# Publishes to branch `gh-pages`. In repo Settings → Pages: Source = "Deploy from a branch",
# Branch = gh-pages, folder = / (root).
#
# If deploy fails: Settings → Actions → General → Workflow permissions →
# "Read and write permissions" (required so GITHUB_TOKEN can push to gh-pages).

name: Deploy site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build CSS (Tailwind)
        run: npm run build

      - name: Assemble publish folder
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r categories images js assets _site/
          touch _site/.nojekyll
          test -f _site/index.html

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: _site
          clean: true
          single-commit: true
